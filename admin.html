<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Praveen Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container { max-width: 900px; margin: 3rem auto; }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
  </style>
</head>
<body id="ap">
  <main class="container admin-container">
    <h1 class="mb-4">Admin Dashboard</h1>

    <section id="login-section" class="card p-4 mb-4">
      <h2 class="h4">Login</h2>
      <form id="login-form" class="row g-3">
        <div class="col-12">
          <label for="username" class="form-label">Username</label>
          <input id="username" name="username" class="form-control" required>
        </div>
        <div class="col-12">
          <label for="password" class="form-label">Password</label>
          <input id="password" name="password" class="form-control" type="password" required>
        </div>
        <div class="col-12">
          <button class="btn btn-primary" type="submit">Sign in</button>
        </div>
      </form>
    </section>

    <section id="admin-panel" class="admin-panel">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Protected Admin Operations</h2>
        <button id="logout-button" class="btn btn-outline-danger btn-sm">Logout</button>
      </div>

      <div id="admin-message" class="alert d-none" role="status"></div>

      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <div class="card p-3 h-100">
            <h3 class="h5">Create blog post</h3>
            <form id="post-form" class="row g-2">
              <input name="title" class="form-control" placeholder="Title" required>
              <textarea name="summary" class="form-control" placeholder="Summary" required></textarea>
              <input name="url" class="form-control" placeholder="Post URL">
              <input name="tags" class="form-control" placeholder="Tags (comma separated)">
              <button class="btn btn-success mt-2" type="submit">Create post</button>
            </form>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card p-3 h-100">
            <h3 class="h5">Add project</h3>
            <form id="project-form" class="row g-2">
              <input name="name" class="form-control" placeholder="Project name" required>
              <textarea name="description" class="form-control" placeholder="Description"></textarea>
              <input name="language" class="form-control" placeholder="Language">
              <input name="html_url" class="form-control" placeholder="Repository URL" required>
              <button class="btn btn-success mt-2" type="submit">Add project</button>
            </form>
          </div>
        </div>

        <div class="col-12">
          <div class="card p-3">
            <h3 class="h5">Hide / show projects</h3>
            <div id="project-admin-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./admin.js"></script>
</body>
</html>
